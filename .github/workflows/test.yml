name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-26  # match release.yml — Xcode 26 / Swift 6+ diagnostics align with what CD builds
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Run tests
        run: swift test --parallel
